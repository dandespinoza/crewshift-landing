version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  admin:
    build:
      context: ./apps/admin
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000
      - PORT=3002
    depends_on:
      - api

  web:
    build:
      context: ./apps/web
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000
      - PORT=3001
    depends_on:
      - api

volumes:
  redis-data:
